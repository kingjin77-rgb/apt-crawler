name: 아파트 공고 자동 수집

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # 매일 6시간마다 (UTC)
  workflow_dispatch:
    inputs:
      regions:
        description: '수집 지역 (쉼표 구분, 비우면 전국)'
        required: false
        default: ''
      sources:
        description: '수집 출처 (applyhome lh sh public officetel building)'
        required: false
        default: 'public officetel building'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup .env
        run: |
          echo "PUBLIC_DATA_API_KEY=${{ secrets.PUBLIC_DATA_API_KEY }}" > .env
          echo "DB_PATH=data/apt_crawler.db" >> .env
          echo "OUTPUT_DIR=data/output" >> .env
          echo "REQUEST_DELAY=1.5" >> .env
          echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" >> .env
          echo "NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}" >> .env

      - name: Run crawler
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          ARGS="--no-detail --export all"
          if [ -n "${{ github.event.inputs.regions }}" ]; then
            ARGS="--regions ${{ github.event.inputs.regions }} $ARGS"
          fi
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            ARGS="--sources ${{ github.event.inputs.sources }} $ARGS"
          fi
          python main.py $ARGS
        timeout-minutes: 15

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawl-results-${{ github.run_number }}
          path: |
            data/output/
            data/apt_crawler.db
          retention-days: 30

      - name: Commit data to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: 공고 데이터 자동 수집 $(date +%Y-%m-%d_%H:%M)"
          git push || true
